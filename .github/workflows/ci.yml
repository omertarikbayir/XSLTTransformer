name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    - name: Restore
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore -c Release
    - name: Test
      run: dotnet test --no-build -c Release
    - name: Pack Core
      run: dotnet pack XSLTTransformer.Core/XSLTTransformer.Core.csproj -c Release -o ./nupkgs
    - name: Upload NuGet
      uses: actions/upload-artifact@v4
      with:
        name: nuget
        path: ./nupkgs/*.nupkg
